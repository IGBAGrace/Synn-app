name: synneo_app
description: Synneo - L'agence spécialisée en communication par l'objet

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  url_launcher: ^6.2.4
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.9
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo/
